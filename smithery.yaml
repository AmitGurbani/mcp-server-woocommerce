startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - WORDPRESS_SITE_URL
      - WOOCOMMERCE_CONSUMER_KEY
      - WOOCOMMERCE_CONSUMER_SECRET
    properties:
      WORDPRESS_SITE_URL:
        type: string
        description: "The full URL of your WordPress site (e.g., https://example.com)"
      WOOCOMMERCE_CONSUMER_KEY:
        type: string
        description: "WooCommerce Consumer Key (starts with ck_)"
      WOOCOMMERCE_CONSUMER_SECRET:
        type: string
        description: "WooCommerce Consumer Secret (starts with cs_)"
      WORDPRESS_USERNAME:
        type: string
        description: "WordPress username for media management tools"
      WORDPRESS_APP_PASSWORD:
        type: string
        description: "WordPress Application Password for media management tools"
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['build/index.js'],
      env: {
        WORDPRESS_SITE_URL: config.WORDPRESS_SITE_URL,
        WOOCOMMERCE_CONSUMER_KEY: config.WOOCOMMERCE_CONSUMER_KEY,
        WOOCOMMERCE_CONSUMER_SECRET: config.WOOCOMMERCE_CONSUMER_SECRET,
        WORDPRESS_USERNAME: config.WORDPRESS_USERNAME || '',
        WORDPRESS_APP_PASSWORD: config.WORDPRESS_APP_PASSWORD || ''
      }
    })
