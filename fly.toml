app = 'mcp-server-woocommerce'
primary_region = 'bom' # Mumbai — closest to Bilimora, Gujarat

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  MCP_TRANSPORT = "http"
  MCP_PORT = "3000"
