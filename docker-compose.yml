services:
  mcp-server:
    build: .
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      - MCP_TRANSPORT=http
      - MCP_PORT=3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      # Auth0 OAuth 2.1 (optional — for Claude.ai web/mobile Connectors)
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - MCP_SERVER_URL=${MCP_SERVER_URL:-}
      # WooCommerce (required)
      - WORDPRESS_SITE_URL=${WORDPRESS_SITE_URL:?WORDPRESS_SITE_URL is required}
      - WOOCOMMERCE_CONSUMER_KEY=${WOOCOMMERCE_CONSUMER_KEY:?WOOCOMMERCE_CONSUMER_KEY is required}
      - WOOCOMMERCE_CONSUMER_SECRET=${WOOCOMMERCE_CONSUMER_SECRET:?WOOCOMMERCE_CONSUMER_SECRET is required}
      # WordPress media (optional)
      - WORDPRESS_USERNAME=${WORDPRESS_USERNAME:-}
      - WORDPRESS_APP_PASSWORD=${WORDPRESS_APP_PASSWORD:-}
      # Safety
      - WOOCOMMERCE_MCP_READ_ONLY=${WOOCOMMERCE_MCP_READ_ONLY:-false}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
