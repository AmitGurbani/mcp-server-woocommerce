name: Bug Report
description: Report a bug with the WooCommerce MCP Server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I call the list_products tool with fields="id,name", I get...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Configure the MCP server with...
        2. Call the tool...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or unexpected output.
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which MCP client are you using?
      options:
        - Claude Desktop
        - Claude Code (CLI)
        - Cursor
        - Windsurf
        - VS Code (Copilot)
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server version
      description: "Version from package.json or npm (e.g., 1.0.0)"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: woo-version
    attributes:
      label: WooCommerce version
      description: "Your WooCommerce version (e.g., 9.6.0)"
      placeholder: "9.6.0"

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: "Output of `node --version`"
      placeholder: "v20.0.0"

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or logs that might help.
